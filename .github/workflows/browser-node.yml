name: 🌐 Rent My Browser Node

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  browser-node:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CI: "1"
      NONINTERACTIVE: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: � Checkout
        uses: actions/checkout@v4


      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ─── Firefox instead of Chrome ───
      - name: 🦊 Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          firefox --version

      # ─── Install OpenClaw via npm directly (skips interactive setup wizard) ───
      - name: 🦞 Install OpenClaw
        run: |
          npm i -g openclaw
          echo "$HOME/.local/bin" >> "$GITHUB_PATH" || true
          echo "$HOME/.openclaw/bin" >> "$GITHUB_PATH" || true

      - name: 📥 Install ClawHub CLI
        run: npm i -g clawhub

      - name: 🔧 Prepare failover script
        run: chmod +x ./failover.sh

      - name: 🚀 Start Node with Gemini Model Failover
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        run: ./failover.sh

      - name: 🩺 Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== Gateway log ==="
          cat /tmp/openclaw-gateway.log 2>/dev/null || echo "(no gateway log)"
          echo ""
          echo "=== OpenClaw node log ==="
          cat /tmp/openclaw-node.log 2>/dev/null || echo "(no node log)"
          echo ""
          echo "=== Running processes ==="
          ps aux | grep -i -E 'openclaw|gateway|node' | grep -v grep | head -n 30 || true
          echo ""
          echo "=== Port 18789 listeners ==="
          ss -tlnp 'sport = :18789' 2>/dev/null || netstat -tlnp 2>/dev/null | grep 18789 || echo "(nothing listening)"
