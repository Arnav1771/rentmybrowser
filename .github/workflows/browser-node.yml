name: 🌐 Rent My Browser Node

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  browser-node:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RMB_API_KEY: ${{ secrets.RMB_API_KEY }}
      CI: "1"
      NONINTERACTIVE: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: � Checkout
        uses: actions/checkout@v4


      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ─── Restore node credentials cache (maintain same node ID across restarts) ───
      - name: 💾 Restore Node Credentials Cache
        uses: actions/cache@v4
        with:
          path: ~/.rent-my-browser-creds
          key: rentmybrowser-node-creds
          restore-keys: |
            rentmybrowser-node-creds

      # ─── Install OpenClaw via npm directly (skips interactive setup wizard) ───
      - name: 🦞 Install OpenClaw
        run: |
          npm i -g openclaw
          echo "$HOME/.local/bin" >> "$GITHUB_PATH" || true
          echo "$HOME/.openclaw/bin" >> "$GITHUB_PATH" || true

      - name: 📥 Install ClawHub CLI
        run: npm i -g clawhub

      - name: 🔧 Prepare failover script
        run: chmod +x ./failover.sh

      - name: 🚀 Start Node with Gemini Model Failover
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        run: ./failover.sh
