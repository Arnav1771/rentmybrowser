name: 🌐 Rent My Browser Node

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  browser-node:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CI: "1"
      NONINTERACTIVE: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📂 Checkout
        uses: actions/checkout@v4

      # ─── Firefox instead of Chrome ───
      - name: 🦊 Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          firefox --version

      # ─── Install OpenClaw via npm directly (skips interactive setup wizard) ───
      - name: 🦞 Install OpenClaw
        run: |
          npm i -g openclaw
          echo "$HOME/.local/bin" >> "$GITHUB_PATH" || true
          echo "$HOME/.openclaw/bin" >> "$GITHUB_PATH" || true

      - name: 📥 Install ClawHub CLI
        run: npm i -g clawhub

      - name: 🔧 Prepare failover script
        run: chmod +x ./failover.sh

      - name: 🚀 Start Node with Gemini Model Failover
        run: ./failover.sh
