name: 🌐 Rent My Browser Node

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  browser-node:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CI: "1"
      NONINTERACTIVE: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📂 Checkout
        uses: actions/checkout@v4

      # ─── Firefox instead of Chrome ───
      - name: 🦊 Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          firefox --version

      # ─── Non-interactive OpenClaw install ───
      - name: 🦞 Install OpenClaw
        run: |
          # redirect stdin from /dev/null so the script can't read from /dev/tty
          curl -fsSL https://openclaw.ai/install.sh | CI=1 NONINTERACTIVE=1 bash </dev/null
          echo "$HOME/.openclaw/bin" >> "$GITHUB_PATH"

      - name: 📥 Install ClawHub CLI
        run: npm i -g clawhub

      - name: 🔧 Prepare failover script
        run: chmod +x ./failover.sh

      - name: 🚀 Start Node with Gemini Model Failover
        run: ./failover.sh
